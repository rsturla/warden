---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: warden-operator
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  - services
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - apps
  resources:
  - deployments
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - cert-manager.io
  resources:
  - certificates
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - networking.k8s.io
  resources:
  - networkpolicies
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - wardenproxy.dev
  resources:
  - tenants
  - wardenproxies
  verbs:
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - wardenproxy.dev
  resources:
  - tenants/finalizers
  verbs:
  - update
- apiGroups:
  - wardenproxy.dev
  resources:
  - tenants/status
  - wardenproxies/status
  verbs:
  - get
  - patch
  - update
