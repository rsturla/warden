apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: agent-egress
  namespace: agent-sandbox
spec:
  podSelector:
    matchLabels:
      role: agent
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: warden
      ports:
        - port: 8080
          protocol: TCP
    - to:
        - podSelector:
            matchLabels:
              app: warden-mt
      ports:
        - port: 8443
          protocol: TCP
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: warden-ingress
  namespace: agent-sandbox
spec:
  podSelector:
    matchLabels:
      app: warden
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              role: agent
      ports:
        - port: 8080
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: warden-mt-ingress
  namespace: agent-sandbox
spec:
  podSelector:
    matchLabels:
      app: warden-mt
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              role: agent
      ports:
        - port: 8443
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: warden-mt-egress
  namespace: agent-sandbox
spec:
  podSelector:
    matchLabels:
      app: warden-mt
  policyTypes:
    - Egress
  egress:
    - {}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: warden-egress
  namespace: agent-sandbox
spec:
  podSelector:
    matchLabels:
      app: warden
  policyTypes:
    - Egress
  egress:
    - {}
