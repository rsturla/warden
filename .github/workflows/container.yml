name: Container

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build image
        run: |
          buildah build \
            --arch ${{ matrix.arch }} \
            --build-arg VERSION=${{ github.sha }} \
            --build-arg COMMIT=$(echo ${{ github.sha }} | cut -c1-7) \
            --build-arg DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ) \
            -t warden:${{ matrix.arch }} \
            -f Containerfile .

      - name: Verify image
        run: |
          podman run --rm localhost/warden:${{ matrix.arch }} -version

      - name: Save image
        run: |
          podman save --format oci-archive -o warden-${{ matrix.arch }}.tar localhost/warden:${{ matrix.arch }}

      - name: Upload image archive
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: warden-${{ matrix.arch }}
          path: warden-${{ matrix.arch }}.tar
          retention-days: 1

  manifest:
    name: Manifest Index
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download amd64 image
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: warden-amd64

      - name: Download arm64 image
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: warden-arm64

      - name: Load images
        run: |
          podman load -i warden-amd64.tar
          podman load -i warden-arm64.tar

      - name: Create manifest index
        run: |
          buildah manifest create warden:latest
          buildah manifest add warden:latest localhost/warden:amd64
          buildah manifest add warden:latest localhost/warden:arm64

      - name: Inspect manifest
        run: |
          buildah manifest inspect warden:latest
