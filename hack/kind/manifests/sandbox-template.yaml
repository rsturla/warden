apiVersion: extensions.agents.x-k8s.io/v1alpha1
kind: SandboxTemplate
metadata:
  name: warden-agent
  namespace: agent-sandbox
spec:
  podTemplate:
    metadata:
      labels:
        role: agent
    spec:
      containers:
        - name: agent
          image: python:3.12-slim
          command: ["sleep", "infinity"]
          env:
            - name: HTTP_PROXY
              value: "http://warden.agent-sandbox.svc:8080"
            - name: HTTPS_PROXY
              value: "http://warden.agent-sandbox.svc:8080"
            - name: http_proxy
              value: "http://warden.agent-sandbox.svc:8080"
            - name: https_proxy
              value: "http://warden.agent-sandbox.svc:8080"
---
apiVersion: extensions.agents.x-k8s.io/v1alpha1
kind: SandboxClaim
metadata:
  name: dev-agent
  namespace: agent-sandbox
spec:
  sandboxTemplateRef:
    name: warden-agent
