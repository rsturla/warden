name: Setup Go with caching
description: Install Go and restore module + build caches. Repo must already be checked out.

inputs:
  go-version-file:
    description: Path to go.mod for version detection
    default: go.mod

runs:
  using: composite
  steps:
    - name: Setup Go
      uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
      with:
        go-version-file: ${{ inputs.go-version-file }}
        cache: false

    - name: Cache Go modules
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
      with:
        path: ~/go/pkg/mod
        key: go-mod-${{ runner.os }}-${{ hashFiles('go.sum') }}
        restore-keys: go-mod-${{ runner.os }}-

    - name: Cache Go build
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
      with:
        path: ~/.cache/go-build
        key: go-build-${{ runner.os }}-${{ hashFiles('go.sum') }}-${{ github.sha }}
        restore-keys: |
          go-build-${{ runner.os }}-${{ hashFiles('go.sum') }}-
          go-build-${{ runner.os }}-

    - name: Download dependencies
      shell: bash
      run: make deps
