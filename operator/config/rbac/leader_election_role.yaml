apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: warden-operator-leader-election
rules:
  - apiGroups:
      - coordination.k8s.io
    resources:
      - leases
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - create
      - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: warden-operator-leader-election
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: warden-operator-leader-election
subjects:
  - kind: ServiceAccount
    name: warden-operator
    namespace: system
