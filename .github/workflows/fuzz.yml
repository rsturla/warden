name: Fuzz

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 3 * * 1" # Weekly Monday 3am UTC
  workflow_dispatch:
    inputs:
      fuzz-time:
        description: Duration per fuzz target
        default: "60s"

permissions:
  contents: read

jobs:
  fuzz:
    name: Fuzz
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Go
        uses: ./.github/actions/setup-go
      - name: Run fuzz targets
        run: make fuzz
        env:
          FUZZ_TIME: ${{ inputs.fuzz-time || (github.event_name == 'schedule' && '5m') || '30s' }}
