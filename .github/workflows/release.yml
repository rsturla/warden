name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  binaries:
    name: Build Binaries (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: ./.github/actions/setup-go

      - name: Build binaries
        env:
          GOOS: linux
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "0"
        run: |
          VERSION=${GITHUB_REF_NAME}
          COMMIT=$(git rev-parse --short HEAD)
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          LDFLAGS="-s -w \
            -X github.com/rsturla/warden/internal/version.Version=${VERSION} \
            -X github.com/rsturla/warden/internal/version.Commit=${COMMIT} \
            -X github.com/rsturla/warden/internal/version.Date=${DATE}"

          go build -trimpath -ldflags="${LDFLAGS}" -o warden ./cmd/warden
          go build -trimpath -ldflags="${LDFLAGS}" -o warden-bridge ./cmd/warden-bridge

      - name: Package binaries
        run: |
          tar czf warden-${GITHUB_REF_NAME}-linux-${{ matrix.arch }}.tar.gz warden warden-bridge

      - name: Upload archive
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: binaries-${{ matrix.arch }}
          path: warden-*.tar.gz
          retention-days: 1

  container:
    name: Build and Push Container (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    outputs:
      digest-amd64: ${{ steps.push.outputs.digest-amd64 }}
      digest-arm64: ${{ steps.push.outputs.digest-arm64 }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build image
        run: |
          buildah build \
            --build-arg VERSION=${GITHUB_REF_NAME} \
            --build-arg COMMIT=$(git rev-parse --short HEAD) \
            --build-arg DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ) \
            -t ${{ env.IMAGE }}:${GITHUB_REF_NAME}-${{ matrix.arch }} \
            -f Containerfile .

      - name: Verify image
        run: |
          podman run --rm ${{ env.IMAGE }}:${GITHUB_REF_NAME}-${{ matrix.arch }} -version

      - name: Push image
        id: push
        run: |
          podman push --digestfile /tmp/digest \
            ${{ env.IMAGE }}:${GITHUB_REF_NAME}-${{ matrix.arch }}
          echo "digest-${{ matrix.arch }}=$(cat /tmp/digest)" >> "$GITHUB_OUTPUT"

      - name: Save digest
        run: |
          mkdir -p digests
          cp /tmp/digest digests/${{ matrix.arch }}

      - name: Upload digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digests-${{ matrix.arch }}
          path: digests/${{ matrix.arch }}
          retention-days: 1

  manifest:
    name: Push Manifest and Sign
    runs-on: ubuntu-latest
    needs: container
    steps:
      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Download amd64 digest
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: digests-amd64
          path: digests/

      - name: Download arm64 digest
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: digests-arm64
          path: digests/

      - name: Create and push manifest
        id: manifest
        run: |
          ls -la digests/
          DIGEST_AMD64=$(cat digests/amd64)
          DIGEST_ARM64=$(cat digests/arm64)

          buildah manifest create ${{ env.IMAGE }}:${GITHUB_REF_NAME}
          buildah manifest add ${{ env.IMAGE }}:${GITHUB_REF_NAME} \
            ${{ env.IMAGE }}@${DIGEST_AMD64} --arch amd64
          buildah manifest add ${{ env.IMAGE }}:${GITHUB_REF_NAME} \
            ${{ env.IMAGE }}@${DIGEST_ARM64} --arch arm64

          buildah manifest push --all \
            --digestfile /tmp/manifest-digest \
            ${{ env.IMAGE }}:${GITHUB_REF_NAME} \
            docker://${{ env.IMAGE }}:${GITHUB_REF_NAME}

          buildah manifest push --all \
            ${{ env.IMAGE }}:${GITHUB_REF_NAME} \
            docker://${{ env.IMAGE }}:latest

          echo "digest=$(cat /tmp/manifest-digest)" >> "$GITHUB_OUTPUT"

      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Sign container image
        env:
          COSIGN_YES: "true"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cosign login ghcr.io -u ${{ github.actor }} -p "${GITHUB_TOKEN}"
          cosign sign ${{ env.IMAGE }}@${{ steps.manifest.outputs.digest }}

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [binaries, manifest]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download amd64 binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: binaries-amd64
          path: dist/

      - name: Download arm64 binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: binaries-arm64
          path: dist/

      - name: Generate checksums
        working-directory: dist
        run: |
          sha256sum warden-*.tar.gz > checksums.txt

      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Sign checksums
        working-directory: dist
        run: |
          cosign sign-blob --yes checksums.txt \
            --bundle checksums.txt.bundle

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: spdx-json
          output-file: dist/sbom.spdx.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          generate_release_notes: true
          files: |
            dist/warden-*.tar.gz
            dist/checksums.txt
            dist/checksums.txt.bundle
            dist/sbom.spdx.json
