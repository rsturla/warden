name: E2E

on:
  pull_request:
    branches: [main]
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'Containerfile'
      - 'go.mod'
      - 'go.sum'
      - 'hack/kind/**'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  e2e:
    name: Kind + Agent Sandbox
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup kind
        uses: helm/kind-action@a1b0e391336a6ee6713a0583f8c6240d70863de3 # v1.12.0
        with:
          install_only: true

      - name: Setup environment
        run: ./hack/kind/setup.sh

      - name: Run tests
        run: ./hack/kind/test.sh

      - name: Warden logs
        if: failure()
        run: kubectl -n agent-sandbox logs -l app=warden --tail=100

      - name: Test server logs
        if: failure()
        run: kubectl -n agent-sandbox logs -l app=test-server --tail=50

      - name: Pod status
        if: failure()
        run: kubectl -n agent-sandbox get pods -o wide

      - name: Teardown
        if: always()
        run: ./hack/kind/teardown.sh
