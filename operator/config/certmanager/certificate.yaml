apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: warden-operator-selfsigned
  namespace: system
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: warden-operator-webhook
  namespace: system
spec:
  secretName: warden-operator-webhook-tls
  dnsNames:
    - warden-operator-webhook.$(NAMESPACE).svc
    - warden-operator-webhook.$(NAMESPACE).svc.cluster.local
  issuerRef:
    name: warden-operator-selfsigned
  privateKey:
    algorithm: ECDSA
    size: 256
