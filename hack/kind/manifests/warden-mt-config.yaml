apiVersion: v1
kind: ConfigMap
metadata:
  name: warden-mt-config
  namespace: agent-sandbox
data:
  config.yaml: |
    server:
      listen: "0.0.0.0:8443"
      health_listen: "0.0.0.0:9090"
      tls:
        cert: /etc/warden/tls/tls.crt
        key: /etc/warden/tls/tls.key
        client_ca: /etc/warden/tenant-ca/ca.crt
    ca:
      cert: /etc/warden/mitm/ca.crt
      key: /etc/warden/mitm/ca.key
    dns:
      cache:
        enabled: true
      deny_resolved_ips:
        - "169.254.0.0/16"
    tenants:
      dir: /etc/warden/tenants.d/
    telemetry:
      logs:
        level: debug
        format: json
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: warden-mt-tenants
  namespace: agent-sandbox
data:
  alpha.yaml: |
    policies:
      - name: allow-test-get
        host: "test-server.agent-sandbox.svc"
        path: "/get"
        methods: ["GET"]
        action: allow
        inject:
          headers:
            Authorization: "Bearer ${ALPHA_TOKEN}"
      - name: allow-test-headers
        host: "test-server.agent-sandbox.svc"
        path: "/headers"
        methods: ["GET"]
        action: allow
        inject:
          headers:
            Authorization: "Bearer ${ALPHA_TOKEN}"
      - name: allow-api-v1
        host: "test-server.agent-sandbox.svc"
        path: "/api/v1/**"
        methods: ["GET"]
        action: allow
    secrets:
      - type: env
  beta.yaml: |
    policies:
      - name: allow-test-get
        host: "test-server.agent-sandbox.svc"
        path: "/get"
        methods: ["GET"]
        action: allow
        inject:
          headers:
            Authorization: "Bearer ${BETA_TOKEN}"
      - name: allow-test-headers
        host: "test-server.agent-sandbox.svc"
        path: "/headers"
        methods: ["GET"]
        action: allow
        inject:
          headers:
            Authorization: "Bearer ${BETA_TOKEN}"
    secrets:
      - type: env
---
apiVersion: v1
kind: Secret
metadata:
  name: warden-mt-secrets
  namespace: agent-sandbox
type: Opaque
stringData:
  ALPHA_TOKEN: "alpha-secret-token-99999"
  BETA_TOKEN: "beta-secret-token-88888"
