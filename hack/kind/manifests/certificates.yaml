apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: tenant-ca
  namespace: agent-sandbox
spec:
  isCA: true
  commonName: "Warden Tenant CA"
  secretName: tenant-ca-keypair
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: selfsigned
    kind: ClusterIssuer
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: mitm-ca
  namespace: agent-sandbox
spec:
  isCA: true
  commonName: "Warden MITM CA"
  secretName: warden-mt-mitm-ca
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: selfsigned
    kind: ClusterIssuer
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: tenant-ca-issuer
  namespace: agent-sandbox
spec:
  ca:
    secretName: tenant-ca-keypair
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: warden-mt-server
  namespace: agent-sandbox
spec:
  secretName: warden-mt-server-tls
  commonName: warden-mt
  dnsNames:
    - warden-mt
    - warden-mt.agent-sandbox.svc
    - warden-mt.agent-sandbox.svc.cluster.local
  usages:
    - server auth
    - digital signature
    - key encipherment
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: tenant-ca-issuer
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: agent-alpha-cert
  namespace: agent-sandbox
spec:
  secretName: agent-alpha-cert
  commonName: alpha
  usages:
    - client auth
    - digital signature
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: tenant-ca-issuer
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: agent-beta-cert
  namespace: agent-sandbox
spec:
  secretName: agent-beta-cert
  commonName: beta
  usages:
    - client auth
    - digital signature
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: tenant-ca-issuer
