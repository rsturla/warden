apiVersion: apps/v1
kind: Deployment
metadata:
  name: warden
  namespace: agent-sandbox
spec:
  replicas: 1
  selector:
    matchLabels:
      app: warden
  template:
    metadata:
      labels:
        app: warden
    spec:
      volumes:
        - name: config
          configMap:
            name: warden-config
        - name: shared-ca
          emptyDir: {}
      containers:
        - name: warden
          image: warden:latest
          imagePullPolicy: Never
          args: ["-config", "/etc/warden/config.yaml"]
          envFrom:
            - secretRef:
                name: warden-secrets
          ports:
            - containerPort: 8080
              name: proxy
            - containerPort: 9090
              name: health
          volumeMounts:
            - name: config
              mountPath: /etc/warden
            - name: shared-ca
              mountPath: /shared
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9090
          readinessProbe:
            httpGet:
              path: /readyz
              port: 9090
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: warden
  namespace: agent-sandbox
spec:
  selector:
    app: warden
  ports:
    - name: proxy
      port: 8080
      targetPort: proxy
    - name: health
      port: 9090
      targetPort: health
