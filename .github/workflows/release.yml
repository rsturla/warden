name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_PROXY: ghcr.io/${{ github.repository }}
  IMAGE_OPERATOR: ghcr.io/${{ github.repository }}-operator

jobs:
  binaries:
    name: Build Binaries (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: ./.github/actions/setup-go

      - name: Build proxy binaries
        env:
          GOOS: linux
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "0"
        run: |
          VERSION=${GITHUB_REF_NAME}
          COMMIT=$(git rev-parse --short HEAD)
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          LDFLAGS="-s -w \
            -X github.com/rsturla/warden/internal/version.Version=${VERSION} \
            -X github.com/rsturla/warden/internal/version.Commit=${COMMIT} \
            -X github.com/rsturla/warden/internal/version.Date=${DATE}"

          go build -trimpath -ldflags="${LDFLAGS}" -o warden ./cmd/warden
          go build -trimpath -ldflags="${LDFLAGS}" -o warden-bridge ./cmd/warden-bridge

      - name: Build operator binary
        env:
          GOOS: linux
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "0"
        working-directory: operator
        run: |
          go build -trimpath -ldflags="-s -w" -o ../warden-operator ./cmd/operator

      - name: Package binaries
        run: |
          tar czf warden-${GITHUB_REF_NAME}-linux-${{ matrix.arch }}.tar.gz \
            warden warden-bridge warden-operator

      - name: Upload archive
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: binaries-${{ matrix.arch }}
          path: warden-*.tar.gz
          retention-days: 1

  container-proxy:
    name: Proxy Container (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push
        run: |
          buildah build \
            --build-arg VERSION=${GITHUB_REF_NAME} \
            --build-arg COMMIT=$(git rev-parse --short HEAD) \
            --build-arg DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ) \
            -t ${{ env.IMAGE_PROXY }}:${GITHUB_REF_NAME}-${{ matrix.arch }} \
            -f Containerfile .

          podman push --digestfile /tmp/digest \
            ${{ env.IMAGE_PROXY }}:${GITHUB_REF_NAME}-${{ matrix.arch }}

          mkdir -p digests/proxy
          cp /tmp/digest digests/proxy/${{ matrix.arch }}

      - name: Upload digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digests-proxy-${{ matrix.arch }}
          path: digests/proxy/${{ matrix.arch }}
          retention-days: 1

  container-operator:
    name: Operator Container (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push
        run: |
          buildah build \
            -t ${{ env.IMAGE_OPERATOR }}:${GITHUB_REF_NAME}-${{ matrix.arch }} \
            -f operator/Containerfile .

          podman push --digestfile /tmp/digest \
            ${{ env.IMAGE_OPERATOR }}:${GITHUB_REF_NAME}-${{ matrix.arch }}

          mkdir -p digests/operator
          cp /tmp/digest digests/operator/${{ matrix.arch }}

      - name: Upload digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digests-operator-${{ matrix.arch }}
          path: digests/operator/${{ matrix.arch }}
          retention-days: 1

  manifest:
    name: Push Manifests and Sign
    runs-on: ubuntu-latest
    needs: [container-proxy, container-operator]
    steps:
      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: digests-*
          merge-multiple: true
          path: digests/

      - name: Push proxy manifest
        id: proxy-manifest
        run: |
          DIGEST_AMD64=$(cat digests/proxy/amd64)
          DIGEST_ARM64=$(cat digests/proxy/arm64)

          buildah manifest create ${{ env.IMAGE_PROXY }}:${GITHUB_REF_NAME}
          buildah manifest add ${{ env.IMAGE_PROXY }}:${GITHUB_REF_NAME} \
            ${{ env.IMAGE_PROXY }}@${DIGEST_AMD64} --arch amd64
          buildah manifest add ${{ env.IMAGE_PROXY }}:${GITHUB_REF_NAME} \
            ${{ env.IMAGE_PROXY }}@${DIGEST_ARM64} --arch arm64

          buildah manifest push --all \
            --digestfile /tmp/proxy-digest \
            ${{ env.IMAGE_PROXY }}:${GITHUB_REF_NAME} \
            docker://${{ env.IMAGE_PROXY }}:${GITHUB_REF_NAME}
          buildah manifest push --all \
            ${{ env.IMAGE_PROXY }}:${GITHUB_REF_NAME} \
            docker://${{ env.IMAGE_PROXY }}:latest

          echo "digest=$(cat /tmp/proxy-digest)" >> "$GITHUB_OUTPUT"

      - name: Push operator manifest
        id: operator-manifest
        run: |
          DIGEST_AMD64=$(cat digests/operator/amd64)
          DIGEST_ARM64=$(cat digests/operator/arm64)

          buildah manifest create ${{ env.IMAGE_OPERATOR }}:${GITHUB_REF_NAME}
          buildah manifest add ${{ env.IMAGE_OPERATOR }}:${GITHUB_REF_NAME} \
            ${{ env.IMAGE_OPERATOR }}@${DIGEST_AMD64} --arch amd64
          buildah manifest add ${{ env.IMAGE_OPERATOR }}:${GITHUB_REF_NAME} \
            ${{ env.IMAGE_OPERATOR }}@${DIGEST_ARM64} --arch arm64

          buildah manifest push --all \
            --digestfile /tmp/operator-digest \
            ${{ env.IMAGE_OPERATOR }}:${GITHUB_REF_NAME} \
            docker://${{ env.IMAGE_OPERATOR }}:${GITHUB_REF_NAME}
          buildah manifest push --all \
            ${{ env.IMAGE_OPERATOR }}:${GITHUB_REF_NAME} \
            docker://${{ env.IMAGE_OPERATOR }}:latest

          echo "digest=$(cat /tmp/operator-digest)" >> "$GITHUB_OUTPUT"

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign images
        env:
          COSIGN_YES: "true"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cosign login ghcr.io -u ${{ github.actor }} -p "${GITHUB_TOKEN}"
          cosign sign ${{ env.IMAGE_PROXY }}@${{ steps.proxy-manifest.outputs.digest }}
          cosign sign ${{ env.IMAGE_OPERATOR }}@${{ steps.operator-manifest.outputs.digest }}

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [binaries, manifest]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: binaries-*
          merge-multiple: true
          path: dist/

      - name: Generate checksums
        working-directory: dist
        run: |
          sha256sum warden-*.tar.gz > checksums.txt

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign checksums
        working-directory: dist
        run: |
          cosign sign-blob --yes checksums.txt \
            --bundle checksums.txt.bundle

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: spdx-json
          output-file: dist/sbom.spdx.json

      - name: Copy CRD manifests
        run: |
          cp operator/config/crd/bases/*.yaml dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          generate_release_notes: true
          files: |
            dist/warden-*.tar.gz
            dist/checksums.txt
            dist/checksums.txt.bundle
            dist/sbom.spdx.json
            dist/wardenproxy.dev_*.yaml
