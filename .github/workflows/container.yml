name: Container

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.image }}-${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        arch: [amd64, arm64]
        image: [warden, warden-operator]
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
          - image: warden
            containerfile: Containerfile
            context: .
            verify_cmd: -version
          - image: warden-operator
            containerfile: operator/Containerfile
            context: .
            verify_cmd: --help
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build image
        run: |
          buildah build \
            --build-arg VERSION=${{ github.sha }} \
            --build-arg COMMIT=$(echo ${{ github.sha }} | cut -c1-7) \
            --build-arg DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ) \
            -t ${{ matrix.image }}:${{ matrix.arch }} \
            -f ${{ matrix.containerfile }} ${{ matrix.context }}

      - name: Save image
        run: |
          podman save --format oci-archive -o ${{ matrix.image }}-${{ matrix.arch }}.tar localhost/${{ matrix.image }}:${{ matrix.arch }}

      - name: Upload image archive
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.image }}-${{ matrix.arch }}
          path: ${{ matrix.image }}-${{ matrix.arch }}.tar
          archive: false
          retention-days: 1
